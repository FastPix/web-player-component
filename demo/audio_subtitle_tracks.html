<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Track Switching Demo</title>
  <script defer src="https://cdn.jsdelivr.net/npm/@fastpix/fp-player@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        fastpix-player {
            width: 100%;
            --aspect-ratio: 21/9;
        }
        .player-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }
        .custom-subtitle {
            position: absolute;
            left: 50%;
            bottom: 10%;
            transform: translateX(-50%);
            max-width: 90%;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            display: none;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
            line-height: 1.4;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        }
        .track-controls {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .track-controls h3 {
            margin: 0 0 10px 0;
        }
        .track-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .track-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        .track-btn:hover {
            border-color: #007bff;
        }
        .track-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .current-track {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Audio Track Switching Demo</h1>
    
    <div class="player-container">
        <fastpix-player 
            playback-id="2125094c-db43-4748-90e1-18539f2ccf98"
            
            preload="auto"
            muted
            default-subtitle-track="English"
            default-audio-track="Bengali"
            metadata-workspace-key="1166877614146125826"
            metadata-video-title="Audio Track Switching Demo"
            metadata-video-id="video-id"
            metadata-viewer-user-id="1234567890"
            metadata-video-duration="100"
            metadata-video-stream-type="live"
            metadata-video-content-type="video"
            metadata-video-drm-type="none"
            metadata-video-encoding-variant="none"
            metadata-video-language-code="en"
            metadata-video-producer="FastPix"
            metadata-video-variant-name="English"
            metadata-video-variant-id="video`"
            metadata-video-series="Audio Track Switching Demo"
            metadata-video-poster-url=""
            metadata-video-source-height="1080"
            metadata-video-source-width="1920"
            metadata-video-cdn="fastpix.io">
            hide-native-subtitles
            enable-cache-busting
            >
        </fastpix-player>
        <!-- One overlay per container; extras are removed at runtime if duplicated. -->
        <div id="demo-custom-subtitle" class="custom-subtitle" data-role="custom-subtitle"></div>
    </div>

    <div class="player-time">
        
        <button id="forwardButton">Forward</button>
        <button id="backwardButton">Backward</button>
        
    </div>

    <div class="track-controls">
        <h3>Audio Tracks</h3>
        <div id="audioButtons" class="track-buttons">
            <em>Loading tracks...</em>
        </div>
        <div id="currentAudio" class="current-track"></div>
    </div>

    <div class="track-controls">
        <h3>Subtitle Tracks</h3>
        <div id="subtitleButtons" class="track-buttons">
            <em>Loading tracks...</em>
        </div>
        <div id="currentSubtitle" class="current-track"></div>
    </div>

    <script>
        // Controls below target the first player on the page,
        // but custom subtitles are scoped per-player container.
        const player = document.querySelector('fastpix-player');
        const audioButtonsContainer = document.getElementById('audioButtons');
        const subtitleButtonsContainer = document.getElementById('subtitleButtons');
        const currentAudioDisplay = document.getElementById('currentAudio');
        const currentSubtitleDisplay = document.getElementById('currentSubtitle');
        const forwardButton = document.getElementById('forwardButton');
        const backwardButton = document.getElementById('backwardButton');

        forwardButton.addEventListener('click', () => {
            player.seekForward(10);
        });
        backwardButton.addEventListener('click', () => {
            player.seekBackward(10);
        });
        
        /** Keeps a single custom subtitle overlay per player container (avoids stacked duplicates). */
        function dedupeCustomSubtitleOverlays(container) {
            if (!container) return;
            const nodes = Array.from(
                container.querySelectorAll('[data-role="custom-subtitle"]')
            );
            if (nodes.length <= 1) return;
            const keep =
                nodes.find((n) => n.id === 'demo-custom-subtitle') || nodes[0];
            for (const n of nodes) {
                if (n !== keep) n.remove();
            }
        }

        function getCustomSubtitleDiv(forPlayer) {
            const container = forPlayer.closest('.player-container');
            if (!container) return null;
            dedupeCustomSubtitleOverlays(container);
            const byId = container.querySelector('#demo-custom-subtitle');
            if (byId) return byId;
            return container.querySelector('[data-role="custom-subtitle"]');
        }

        function clearCustomSubtitleOverlay(forPlayer) {
            const el = getCustomSubtitleDiv(forPlayer);
            if (el) {
                el.textContent = '';
                el.style.display = 'none';
            }
        }

        if (player) {
            const root = player.closest('.player-container');
            if (root) dedupeCustomSubtitleOverlays(root);
        }

        let subtitlePollId = null;

        // Wait for tracks to be ready
        player.addEventListener('fastpixtracksready', (e) => {
            console.log("Tracks ready!", e.detail);
            
            // Get audio tracks
            const audioTracks = player.getAudioTracks();
            console.log("Audio tracks:", audioTracks);
            
            // Render audio track buttons
            renderAudioButtons(audioTracks);

            // Subtitle tracks often become available slightly after MANIFEST_PARSED.
            // Poll getSubtitleTracks() for a short window so we render
            // all detected subtitle tracks automatically, without needing to click Off.
            if (subtitlePollId) {
                clearInterval(subtitlePollId);
            }
            const startTime = Date.now();
            subtitlePollId = setInterval(() => {
                const subtitleTracks = player.getSubtitleTracks();
                if (subtitleTracks && subtitleTracks.length > 0) {
                    clearInterval(subtitlePollId);
                    subtitlePollId = null;
                    console.log("Polled subtitle tracks:", subtitleTracks);
                    renderSubtitleButtons(subtitleTracks);
                } else if (Date.now() - startTime > 10000) {
                    clearInterval(subtitlePollId);
                    subtitlePollId = null;
                }
            }, 1000);
        });

        // Custom subtitle overlay: attach to ALL players so each renders separately.
        document.querySelectorAll('fastpix-player').forEach((p) => {
            p.addEventListener('fastpixsubtitlecue', (e) => {
                const { text, language, startTime, endTime } = /** @type {CustomEvent} */ (e).detail;
                // Uncomment for cue-by-cue debugging (logging every cue can add main-thread cost).
                // console.log('Current subtitle cue:', text, language, startTime, endTime);

                // Only show cues when a subtitle track is actually enabled (not Off).
                const subtitleTracks = p.getSubtitleTracks();
                const hasActiveSubtitle = Array.isArray(subtitleTracks) && subtitleTracks.some(t => t.isCurrent);

                const customSubtitleDiv = getCustomSubtitleDiv(p);
                if (customSubtitleDiv) {
                    if (hasActiveSubtitle && text) {
                        customSubtitleDiv.textContent = text;
                        customSubtitleDiv.style.display = 'block';
                    } else {
                        customSubtitleDiv.textContent = '';
                        customSubtitleDiv.style.display = 'none';
                    }
                }
            });
        });

        // Listen for audio track changes
        player.addEventListener('fastpixaudiochange', (e) => {
            const { tracks, currentTrack } = /** @type {CustomEvent} */ (e).detail || {};
            const resolvedCurrent = currentTrack || (Array.isArray(tracks) ? tracks.find(t => t.isCurrent) : null);
            console.log("Audio changed. Current track:", resolvedCurrent);
            renderAudioButtons(tracks || player.getAudioTracks());
        });

        // Listen for subtitle track changes (built-in menu, setSubtitleTrack, disableSubtitles, demo buttons)
        player.addEventListener('fastpixsubtitlechange', (e) => {
            const targetPlayer = /** @type {HTMLElement} */ (e.currentTarget);
            const { tracks, currentTrack } = /** @type {CustomEvent} */ (e).detail || {};
            const list =
                Array.isArray(tracks) && tracks.length > 0
                    ? tracks
                    : targetPlayer.getSubtitleTracks();
            // When Off, nothing is isCurrent — find() is undefined; detail.currentTrack may be absent.
            const fromList = list.find((t) => t.isCurrent);
            const resolvedCurrent =
                currentTrack !== undefined && currentTrack !== null
                    ? currentTrack
                    : fromList !== undefined
                      ? fromList
                      : null;
            console.log(
                'Subtitle changed. Current track:',
                resolvedCurrent === null ? 'Off' : resolvedCurrent
            );
            const anySubtitleOn =
                Array.isArray(list) && list.some((t) => t.isCurrent);
            if (!anySubtitleOn) {
                clearCustomSubtitleOverlay(targetPlayer);
            }
            renderSubtitleButtons(list);
        });

        function renderAudioButtons(tracks) {
            if (!tracks || tracks.length === 0) {
                audioButtonsContainer.innerHTML = '<em>No audio tracks available</em>';
                currentAudioDisplay.textContent = '';
                return;
            }

            audioButtonsContainer.innerHTML = '';
            
            tracks.forEach(track => {
                const btn = document.createElement('button');
                btn.className = 'track-btn' + (track.isCurrent ? ' active' : '');
                btn.textContent = `${track.label} (${track.language || 'unknown'})`;
                btn.onclick = () => {
                    console.log(`Switching to audio track: ${track.label} (${track.language || 'unknown'})`);
                    // Public API is label-driven (no numeric ids / language codes)
                    player.setAudioTrack(track.label);
                };
                audioButtonsContainer.appendChild(btn);
            });

            const current = tracks.find(t => t.isCurrent);
            currentAudioDisplay.textContent = current 
                ? `Current: ${current.label} (id: ${current.id})` 
                : '';
        }

        function renderSubtitleButtons(tracks) {
            subtitleButtonsContainer.innerHTML = '';
            
            // Add "Off" button
            const offBtn = document.createElement('button');
            offBtn.className = 'track-btn' + (!tracks.some(t => t.isCurrent) ? ' active' : '');
            offBtn.textContent = 'Off';
            offBtn.onclick = () => {
                // Public API: null turns subtitles off (dispatches fastpixsubtitlechange).
                // Equivalent built-in behavior: player.disableSubtitles().
                console.log('Turning subtitles off: setSubtitleTrack(null)');
                player.setSubtitleTrack(null);
                clearCustomSubtitleOverlay(player);
            };
            subtitleButtonsContainer.appendChild(offBtn);

            if (!tracks || tracks.length === 0) {
                currentSubtitleDisplay.textContent = 'No subtitle tracks available';
                return;
            }
            
            tracks.forEach(track => {
                const btn = document.createElement('button');
                btn.className = 'track-btn' + (track.isCurrent ? ' active' : '');
                btn.textContent = `${track.label} (${track.language || 'unknown'})`;
                btn.onclick = () => {
                    console.log(`Switching to subtitle track: ${track.label} (${track.language || 'unknown'})`);
                    // Public API is label-driven (no numeric ids / language codes)
                    player.setSubtitleTrack(track.label);
                };
                subtitleButtonsContainer.appendChild(btn);
            });

            const current = tracks.find(t => t.isCurrent);
            currentSubtitleDisplay.textContent = current 
                ? `Current: ${current.label} (id: ${current.id})` 
                : 'Current: Off';
        }
    </script>
</body>
</html>
